<!DOCTYPE html>
<html lang="en">
<head>
  <title>Test::dynamic select</title>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <script type="text/javascript">
    const commandDuration = 100;

    function addOption(select, value, text) {
      var option = document.createElement('option');
      option.value = value;
      option.textContent = text;
      select.appendChild(option);
    }

    function drawOptions() {
      var select = document.getElementById('language');
      addOption(select, "'eng'", "l'a " + '"English"');
      addOption(select, "rus", "l'a " + '"Русский"');
      addOption(select, '"est"', "l'a " + '"Eesti"');
    }

    function rebuildBooks() {
      var books = document.getElementById('books');
      if (books) books.remove();
      if (document.getElementById('language').value === 'rus') {
        setTimeout(buildBooks, commandDuration*1.5);
      }
    }

    function buildBooks() {
      var form = document.querySelector('form');
      var select = document.createElement('select');
      select.id = 'books';
      var option = document.createElement('option');
      option.value = '1';
      option.textContent = 'книжко';
      select.appendChild(option);
      form.appendChild(select);
    }

    document.addEventListener('DOMContentLoaded', function () {
      var language = document.getElementById('language');
      language.addEventListener('change', function() {
        document.querySelector('h2').textContent = language.value;
        setTimeout(rebuildBooks, commandDuration*1.5); // a little bit longer than average Selenium command like "isDisplayed()".
      });

      setTimeout(drawOptions, commandDuration*3);
    });

  </script>
  <link rel="stylesheet" href="/selenide-test.css">
</head>
<body>
<header class="selenide-test-banner">Selenide</header>
<h1>Page with dynamic select</h1>
<h2></h2>
<br/>

<div style="width: 400px">
  <form>
    <label> Language:
      <select id="language">
        <option>-- Choose language--</option>
      </select>
    </label>

    <br/>
    <label> Book:
      <select id="books">
        <option selected="" value="0" title="All">All</option>
        <option value="1">книжко</option>
      </select>
    </label>
  </form>
</div>
</body>
</html>
