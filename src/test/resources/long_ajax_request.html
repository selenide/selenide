<!DOCTYPE html>
<html lang="en">
<head>
  <title>long ajax request</title>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <script type="text/javascript">
      var commandDuration = 100;

      function runLongAjaxRequest() {
        document.getElementById('results').innerHTML = "<span id='loading'>Loading...</span><br/><ul></ul>";
        setTimeout(function() {document.querySelector('#results ul').insertAdjacentHTML('beforeend', "<li>Result 1<span id='result-1'>r1</span></li>");}, commandDuration*3);
        setTimeout(function() {document.querySelector('#results ul').insertAdjacentHTML('beforeend', "<li>Result 2<span id='result-2'>r2</span></li>");}, commandDuration*4);
        setTimeout(function() {document.getElementById('loading').remove();}, commandDuration*10);
      }
  </script>
  <link rel="stylesheet" href="/selenide-test.css">
</head>
<body>
<header class="selenide-test-banner">Selenide</header>
<h1>The long ajax request test</h1>
<button onclick="runLongAjaxRequest()">Run long request</button>
<div id="results">
</div>

<table id="multirowTable" style="border: 1px;">
  <tbody>
  <tr>
    <td class="first_row">Chack</td>
    <td>Norris</td>
  </tr>
  <tr>
    <td class="second_row">Chack</td>
    <td>Lä Baskerville</td>
  </tr>
  </tbody>
</table>
</body>
</html>
