<!DOCTYPE html>
<html lang="en">
<head>
  <title>Test::autocomplete</title>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <script type="text/javascript">
      function log(e) {
        if (typeof console !== "undefined") console.log(e);
        var li = document.createElement('li');
        li.textContent = e.type + ': ' + e.keyCode + ', ' + e.charCode + ', ' + e.which;
        document.getElementById('log').appendChild(li);
      }

      document.addEventListener('DOMContentLoaded', function() {
        var tags = document.getElementById('tags');
        ['change', 'keyup', 'keydown', 'keypress', 'input', 'paste'].forEach(function(type) {
          tags.addEventListener(type, log);
        });
        tags.addEventListener('change', function(event) {
          document.querySelector('h4').textContent = "This is " + event.currentTarget.value + "!";
        });
      });

  </script>
  <style type="text/css" media="screen">
      body {
        font-family: "Trebuchet MS", "Helvetica", "Arial",  "Verdana", "sans-serif";
        font-size: 62.5%;
      }

  </style>
  <link rel="stylesheet" href="/selenide-test.css">
</head>
<body>
<header class="selenide-test-banner">Selenide</header>
<h1>Page with autocomplete</h1>

<ul id="log">
</ul>

<br/>
<label for="tags">Tags:
  <input id="tags" list="available-tags" autocomplete="off"/>
</label>
<datalist id="available-tags">
  <option value="ActionScript"></option>
  <option value="AppleScript"></option>
  <option value="Asp"></option>
  <option value="BASIC"></option>
  <option value="C"></option>
  <option value="C++"></option>
  <option value="Clojure"></option>
  <option value="COBOL"></option>
  <option value="ColdFusion"></option>
  <option value="Erlang"></option>
  <option value="Fortran"></option>
  <option value="Groovy"></option>
  <option value="Haskell"></option>
  <option value="Java"></option>
  <option value="JavaScript"></option>
  <option value="Lisp"></option>
  <option value="Perl"></option>
  <option value="PHP"></option>
  <option value="Python"></option>
  <option value="Ruby"></option>
  <option value="Scala"></option>
  <option value="Scheme"></option>
</datalist>

<h4></h4>

<button id="anyButton" onclick="void(0);">search</button>
</body>
</html>
